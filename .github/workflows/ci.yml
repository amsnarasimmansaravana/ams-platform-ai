name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install shared + gateway
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/ams-common
          pip install -e "./services/gateway[dev]"

      - name: Ruff (gateway)
        run: |
          cd services/gateway
          ruff format --check src tests
          ruff check src tests

      - name: Mypy (ams-common + gateway)
        run: |
          mypy -p ams_common
          cd services/gateway && mypy -p gateway_service

      - name: Pytest (gateway)
        run: pytest services/gateway/tests -q
