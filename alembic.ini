# Alembic Configuration
# This is configuration for Alembic database migration tool

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Alembic Script Location
script_location = backend/alembic

# Logging configuration
sqlalchemy.url =

# Migration file location
file_template = %%(rev)s_%%(slug)s

# Revision identifier style
revision_file_format = %%(rev)s_%%(slug)s

# Automatic script mode
# Set to 'true' to enable automatic generation of migration scripts
# use_assoc = true

# Hook into the alembic migration process
# sqlalchemy.url is set by env.py from environment
