[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ams-common"
version = "0.1.0"
description = "Shared libraries for AMS-AI microservices"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "httpx>=0.28.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ams_common = ["py.typed"]
